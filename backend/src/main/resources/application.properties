spring.application.name=backend
server.port=${PORT:8080}

# Database - use separate vars to build a proper JDBC URL (avoids JDBC driver userinfo parsing issues)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pickleball_tms}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:140903}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Speed up startup on Render free tier (slow CPU)
spring.main.lazy-initialization=true

logging.level.org.springframework.security=WARN

# App properties
app.jwt-secret=${JWT_SECRET:daf66e01593f61a15b857cf433aae03a005812b31234e149036bcc8dee755dbb}
app.jwt-expiration-milliseconds=604800000